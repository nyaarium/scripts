services:
  dev:
    tty: true
    hostname: devcontainer
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.devcontainer
      pull: true
      args:
        PROJECT_NAME: nyaascripts
    environment:
      SSH_AUTH_SOCK: /tmp/ssh-agent.sock
    volumes:
      # SSH agent forwarding
      - /tmp/ssh-agent.sock:/tmp/ssh-agent.sock
      # Workspace
      - ..:/workspace/nyaascripts:cached
      # Home
      - ../volumes/home:/home/vscode:cached
    networks:
      default:
      switchboard-network:
        aliases:
          - nyaascripts
networks:
  switchboard-network:
    name: switchboard
